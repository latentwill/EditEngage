services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - ORIGIN=${ORIGIN}
      - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - PUBLIC_SUPABASE_ANON_KEY=${PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-editengage_redis_secret}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_ENVIRONMENT=${NODE_ENV:-production}
      - LLM_SERVICE_URL=http://llm-service:8000
      - APP_DOMAIN=${APP_DOMAIN:-api.editengage.com}
      - ENABLE_EXTERNAL_HEALTH_CHECK=${ENABLE_EXTERNAL_HEALTH_CHECK:-false}
      - EXTERNAL_HEALTH_CHECK_INTERVAL_MS=${EXTERNAL_HEALTH_CHECK_INTERVAL_MS:-300000}
      - EXTERNAL_HEALTH_CHECK_TIMEOUT_MS=${EXTERNAL_HEALTH_CHECK_TIMEOUT_MS:-5000}
    depends_on:
      - redis
      - llm-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-editengage_redis_secret}
      - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_ENVIRONMENT=${NODE_ENV:-production}
      - LLM_SERVICE_URL=http://llm-service:8000
    depends_on:
      - redis
      - llm-service
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'tsx' || pgrep -f 'node' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  llm-service:
    build:
      context: .
      dockerfile: packages/llm-service/Dockerfile
    expose:
      - "8000"
    environment:
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_ENVIRONMENT=${NODE_ENV:-production}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://0.0.0.0:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-editengage_redis_secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-editengage_redis_secret} --maxmemory 256mb --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

volumes:
  redis-data:
